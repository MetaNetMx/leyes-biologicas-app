function getSessionId() {
  let sid = sessionStorage.getItem('lb_session_id');
  if (!sid) {
    sid = 'sess_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem('lb_session_id', sid);
  }
  return sid;
}

function descargarBlob(blob, nombre) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nombre;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// WAV → MP3 con lamejs (en el navegador)
async function wavBlobToMp3(wavBlob) {
  const arrayBuffer = await wavBlob.arrayBuffer();
  const view = new DataView(arrayBuffer);
  // Parsear header WAV mínimo
  const numChannels = view.getUint16(22, true);
  const sampleRate = view.getUint32(24, true);
  const bitsPerSample = view.getUint16(34, true);
  // Buscar chunk "data"
  let dataOffset = 12;
  while (dataOffset < arrayBuffer.byteLength - 8) {
    const id = String.fromCharCode(view.getUint8(dataOffset), view.getUint8(dataOffset+1), view.getUint8(dataOffset+2), view.getUint8(dataOffset+3));
    const size = view.getUint32(dataOffset+4, true);
    if (id === 'data') { dataOffset += 8; break; }
    dataOffset += 8 + size;
  }
  const samples = new Int16Array(arrayBuffer.slice(dataOffset));
  // Encode MP3 con lamejs (mono o estéreo)
  const mp3encoder = new lamejs.Mp3Encoder(numChannels === 2 ? 2 : 1, sampleRate, 128);
  const mp3Data = [];
  const blockSize = 1152;
  if (numChannels === 1) {
    for (let i = 0; i < samples.length; i += blockSize) {
      const block = samples.subarray(i, i + blockSize);
      const enc = mp3encoder.encodeBuffer(block);
      if (enc.length > 0) mp3Data.push(enc);
    }
  } else {
    // Separar L y R
    const left = new Int16Array(samples.length / 2);
    const right = new Int16Array(samples.length / 2);
    for (let i = 0, j = 0; i < samples.length; i += 2, j++) {
      left[j] = samples[i];
      right[j] = samples[i + 1];
    }
    for (let i = 0; i < left.length; i += blockSize) {
      const enc = mp3encoder.encodeBuffer(
        left.subarray(i, i + blockSize),
        right.subarray(i, i + blockSize)
      );
      if (enc.length > 0) mp3Data.push(enc);
    }
  }
  const flush = mp3encoder.flush();
  if (flush.length > 0) mp3Data.push(flush);
  return new Blob(mp3Data, { type: 'audio/mpeg' });
}

      </div>

// ─────────────────────────── COACH (chat) ───────────────────────────

async function llamarChat({ mensajes, sessionId, onChunk }) {
  const ctrl = new AbortController();
  const timeoutId = setTimeout(() => ctrl.abort(), 55000);
  try {
    const res = await fetch(CHAT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: mensajes, session_id: sessionId }),
      signal: ctrl.signal,
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`Servidor ${res.status}: ${txt.substring(0, 200)}`);
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', textoCompleto = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') continue;
        try {
          const ev = JSON.parse(data);
          if (ev.chunk) { textoCompleto += ev.chunk; if (onChunk) onChunk(textoCompleto); }
          else if (ev.error) throw new Error(ev.error);
          else if (ev.done) { /* fin de stream */ }
        } catch (e) { if (e.message?.startsWith('Servidor') || e.message?.startsWith('MiMo') || e.message?.startsWith('El modelo')) throw e; }
      }
    }
    clearTimeout(timeoutId);
    return textoCompleto;
  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') throw new Error('El servidor tardó demasiado. Intenta de nuevo.');
    throw e;
  }
}

function parsearJSON(texto) {
  if (!texto) return null;
  let limpio = texto.trim();
  if (limpio.startsWith('```json')) limpio = limpio.slice(7);
  if (limpio.startsWith('```')) limpio = limpio.slice(3);
  if (limpio.endsWith('```')) limpio = limpio.slice(0, -3);
  limpio = limpio.trim();
  const i = limpio.indexOf('{'), f = limpio.lastIndexOf('}');
  if (i === -1 || f === -1) return null;
  const j = limpio.slice(i, f + 1);
  try { return JSON.parse(j); } catch (e) {}
  try { return JSON.parse(j.replace(/,(\s*[}\]])/g, '$1')); } catch (e) {}
  const m = limpio.match(/"mensaje"\s*:\s*"((?:[^"\\]|\\.)*)"/s);
  if (m) return { mensaje: m[1].replace(/\\n/g, '\n').replace(/\\"/g, '"'), siguiente_accion: 'pregunta_abierta' };
  return null;
}

function getMejorVozES() {
  const v = window.speechSynthesis.getVoices();
  if (!v.length) return null;
  for (const lang of ['es-MX', 'es-419', 'es-US', 'es-ES', 'es']) {
    const found = v.find(x => x.lang.startsWith(lang));
    if (found) return found;
  }
  return v.find(x => x.lang.startsWith('es')) || v[0];
}

function renderInlineMd(text) {
  const partes = [];
  const regex = /\*\*([^*]+)\*\*/g;
  let lastIdx = 0, m, key = 0;
  while ((m = regex.exec(text)) !== null) {
    if (m.index > lastIdx) partes.push(<span key={key++}>{text.slice(lastIdx, m.index)}</span>);
    partes.push(<strong key={key++} className="text-[var(--color-base)]">{m[1]}</strong>);
    lastIdx = m.index + m[0].length;
  }
  if (lastIdx < text.length) partes.push(<span key={key++}>{text.slice(lastIdx)}</span>);
  return partes;
}

function TextoFormateado({ texto }) {
  if (!texto) return null;
  return (
    <div className="space-y-2">
      {texto.split(/\n\n+/).map((p, i) => (
        <p key={i} className="whitespace-pre-wrap leading-relaxed">{renderInlineMd(p)}</p>
      ))}
    </div>
  );
}

function Burbuja({ rol, contenido }) {
  if (rol === 'user') {
    return (
      <div className="flex justify-end mb-4 fade-in">
        <div className="bg-[var(--color-base)] text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[80%]">
          <p className="whitespace-pre-wrap">{contenido}</p>
        </div>

  }
  return (

      <div className="bg-white border border-stone-200 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%] card-shadow text-stone-800">
        <TextoFormateado texto={contenido} />
      </div>
    </div>

}

function MeditacionCard({ texto }) {
  const [estado, setEstado] = useState('idle');
  const [voces, setVoces] = useState([]);
  const [vozSel, setVozSel] = useState(null);
  const [generandoMp3, setGenerandoMp3] = useState(false);
  const [errorMp3, setErrorMp3] = useState(null);
  const [progresoMp3, setProgresoMp3] = useState('');
  const supported = typeof window !== 'undefined' && 'speechSynthesis' in window;

  useEffect(() => {
    if (!supported) return;
    const cargar = () => {
      const lista = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('es'));
      setVoces(lista);
      if (!vozSel && lista.length) setVozSel(getMejorVozES());
    };
    cargar();
    window.speechSynthesis.onvoiceschanged = cargar;
    return () => { try { window.speechSynthesis.cancel(); } catch(e) {} };
  }, []);

  const limpio = texto.replace(/\*\*/g, '').replace(/---+/g, '...').replace(/##+\s*/g, '');

  const play = () => {
    if (!supported || !vozSel) return;
    try { window.speechSynthesis.cancel(); } catch(e) {}
    const u = new SpeechSynthesisUtterance(limpio);
    u.voice = vozSel; u.lang = vozSel.lang; u.rate = 0.82; u.pitch = 0.95;
    u.onend = () => setEstado('idle'); u.onerror = () => setEstado('idle');
    window.speechSynthesis.speak(u);
    setEstado('playing');
  };
  const pause = () => { window.speechSynthesis.pause(); setEstado('paused'); };
  const resume = () => { window.speechSynthesis.resume(); setEstado('playing'); };
  const stop = () => { window.speechSynthesis.cancel(); setEstado('idle'); };

  const descargarTxt = () => {
    descargarBlob(new Blob([limpio], { type: 'text/plain;charset=utf-8' }), 'meditacion.txt');
  };

  const descargarMp3 = async () => {
    setGenerandoMp3(true); setErrorMp3(null); setProgresoMp3('Solicitando audio al servidor...');
    try {
      const res = await fetch(TTS_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: limpio }),
      });
      if (!res.ok) {
        const errTxt = await res.text();
        throw new Error(`Servidor ${res.status}: ${errTxt.substring(0, 200)}`);
      }
      setProgresoMp3('Convirtiendo a MP3...');
      const wavBlob = await res.blob();
      const mp3Blob = await wavBlobToMp3(wavBlob);
      descargarBlob(mp3Blob, 'meditacion.mp3');
      setProgresoMp3('');
    } catch (e) {
      setErrorMp3(e.message);
    } finally {
      setGenerandoMp3(false);
    }
  };

  return (
    <div className="bg-white border border-stone-200 rounded-2xl p-5 mb-4 card-shadow fade-in">
      <div className="flex items-center gap-2 mb-4 text-[var(--color-base)]">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <h3 className="font-semibold">Meditación de cierre</h3>
      </div>

      {supported && (
        <div className="bg-stone-50 rounded-xl p-4 mb-3">
          <div className="flex items-center gap-2 flex-wrap mb-3">
            {estado === 'idle' && (
              <button onClick={play} className="flex items-center gap-2 px-4 py-2 bg-[var(--color-accent)] text-white rounded-lg hover:opacity-90 text-sm">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Escuchar ahora
              </button>
            )}
            {estado === 'playing' && (
              <button onClick={pause} className="flex items-center gap-2 px-4 py-2 bg-[var(--color-base)] text-white rounded-lg text-sm">Pausar</button>
            )}
            {estado === 'paused' && (
              <button onClick={resume} className="flex items-center gap-2 px-4 py-2 bg-[var(--color-accent)] text-white rounded-lg text-sm">Continuar</button>
            )}
            {estado !== 'idle' && (
              <button onClick={stop} className="px-3 py-2 border border-stone-300 rounded-lg hover:bg-stone-100 text-xs">Detener</button>
            )}
            {voces.length > 1 && (
              <select value={vozSel?.name || ''} onChange={(e) => { const v = voces.find(x => x.name === e.target.value); if (v) { setVozSel(v); if (estado === 'playing') { stop(); setTimeout(play, 100); } } }}
                className="ml-auto text-xs border border-stone-300 rounded px-2 py-1.5 bg-white">
                {voces.map(v => <option key={v.name} value={v.name}>{v.name} ({v.lang})</option>)}
              </select>
            )}
          </div>
          <p className="text-xs text-stone-500">Reproducción rápida con voz del navegador.</p>
        </div>
      )}

      <div className="border-t border-stone-100 pt-3">
        <p className="text-xs text-stone-500 mb-2">Descargar para usar offline:</p>
        <div className="flex gap-2 flex-wrap">
          <button onClick={descargarTxt} className="flex items-center gap-2 px-3 py-2 border border-stone-300 rounded-lg hover:bg-stone-50 text-sm">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Descargar texto (.txt)
          </button>
          <button onClick={descargarMp3} disabled={generandoMp3} className={`flex items-center gap-2 px-3 py-2 rounded-lg text-sm ${generandoMp3 ? 'bg-stone-200 text-stone-500 cursor-wait' : 'border border-stone-300 hover:bg-stone-50'}`}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            {generandoMp3 ? (progresoMp3 || 'Generando...') : 'Descargar audio (.mp3)'}
          </button>
        </div>
        {errorMp3 && <p className="text-xs text-red-600 mt-2">{errorMp3}</p>}
      </div>

      <details className="text-sm mt-3">
        <summary className="cursor-pointer text-stone-600 hover:text-stone-800">Ver texto completo</summary>
        <div className="meditation-text mt-3 text-stone-700 max-h-96 overflow-y-auto p-3 bg-stone-50 rounded-lg">{limpio}</div>
      </details>
    </div>
  );
}

function PreguntaOpciones({ pregunta, onResponder }) {
  const [seleccion, setSeleccion] = useState(pregunta.multi_select ? [] : null);
  const multi = pregunta.multi_select;
  const toggle = (l) => multi ? setSeleccion(seleccion.includes(l) ? seleccion.filter(x => x !== l) : [...seleccion, l]) : setSeleccion(l);
  const valido = multi ? seleccion.length > 0 : seleccion !== null;
  return (
    <div className="bg-white border border-stone-200 rounded-2xl p-5 mb-4 card-shadow fade-in">
      <p className="font-medium text-[var(--color-base)] mb-3">{pregunta.pregunta}</p>
      <div className="space-y-2 mb-4">
        {pregunta.opciones?.map((op, i) => {
          const activo = multi ? seleccion.includes(op.label) : seleccion === op.label;
          return (
            <button key={i} onClick={() => toggle(op.label)} className={`w-full text-left p-3 rounded-lg border-2 transition text-sm ${activo ? 'border-[var(--color-accent)] bg-orange-50' : 'border-stone-200 hover:border-stone-300'}`}>
              <div className="font-medium text-stone-900">{op.label}</div>
              {op.desc && <div className="text-xs text-stone-600 mt-1">{op.desc}</div>}
            </button>
          );
        })}
      </div>
      <button onClick={() => onResponder(`${pregunta.pregunta}\n→ ${multi ? seleccion.join(', ') : seleccion}`)} disabled={!valido} className={`w-full py-2.5 rounded-lg font-medium text-sm transition ${valido ? 'bg-[var(--color-base)] text-white hover:bg-[var(--color-soft)]' : 'bg-stone-200 text-stone-400'}`}>Responder</button>
    </div>
  );
}

      <h3 className="font-semibold text-[var(--color-base)] mb-3">Análisis</h3>

}

function InputLibre({ onEnviar, disabled, placeholder }) {
  const [texto, setTexto] = useState('');
  const ref = useRef();
  useEffect(() => { if (!disabled && ref.current) ref.current.focus(); }, [disabled]);
  const enviar = () => { if (texto.trim() && !disabled) { onEnviar(texto.trim()); setTexto(''); } };
  return (
    <div className="border-t border-stone-200 bg-white p-4 rounded-b-2xl">
      <div className="flex gap-2">
        <textarea ref={ref} value={texto} onChange={(e) => setTexto(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); } }}
          placeholder={placeholder || "Escribe..."} rows={2} disabled={disabled}
          className="flex-1 border border-stone-300 rounded-lg p-2.5 resize-none focus:outline-none focus:border-[var(--color-accent)] text-sm disabled:bg-stone-50" />
        <button onClick={enviar} disabled={!texto.trim() || disabled} className={`px-5 rounded-lg font-medium transition ${texto.trim() && !disabled ? 'bg-[var(--color-base)] text-white hover:bg-[var(--color-soft)]' : 'bg-stone-200 text-stone-400'}`}>Enviar</button>
      </div>
      <p className="text-xs text-stone-400 mt-2">Enter para enviar · Shift+Enter para nueva línea</p>
    </div>
  );
}

function CoachSection() {
  const [mensajes, setMensajes] = useState([]);
  const [interaccion, setInteraccion] = useState(null);
  const [pensando, setPensando] = useState(false);
  const [error, setError] = useState(null);
  const chatRef = useRef();
  const sessionIdRef = useRef(getSessionId());
  const lastUserMsgRef = useRef(null);

  useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [mensajes, interaccion, pensando]);
  useEffect(() => { if (mensajes.length === 0) iniciar(); }, []);

  function iniciar() {
    setMensajes([{ rol: 'assistant', contenido: "Hola. Cuéntame qué síntoma físico te está pasando. Descríbelo con tus propias palabras, no necesitas usar términos médicos. Cuando quieras estoy listo para empezar." }]);
    setInteraccion({ tipo: 'esperando_input', placeholder: 'Describe tu síntoma con tus propias palabras...' });
  }

  async function enviar(texto) {
    setError(null);
    lastUserMsgRef.current = texto;
    const nuevos = [...mensajes, { rol: 'user', contenido: texto }];
    setMensajes(nuevos);
    setInteraccion(null);
    setPensando(true);
    const api = nuevos.filter(m => m.rol === 'user' || m.rol === 'assistant').map(m => ({ role: m.rol === 'user' ? 'user' : 'assistant', content: m.contenido }));
    try {
      let cruda = '';
      await llamarChat({ mensajes: api, sessionId: sessionIdRef.current, onChunk: (t) => { cruda = t; } });
      if (!cruda) throw new Error('Respuesta vacía.');
      const parsed = parsearJSON(cruda);
      if (!parsed) {
        setMensajes([...nuevos, { rol: 'assistant', contenido: cruda }]);
        setInteraccion({ tipo: 'esperando_input', placeholder: 'Continúa...' });
      } else manejar(parsed, nuevos);
    } catch (e) {
      console.error(e);
      setError(e.message);
      setInteraccion({ tipo: 'esperando_input', placeholder: 'Reintenta o escribe otra cosa...' });
    } finally { setPensando(false); }
  }

  function reintentarUltimo() {
    if (lastUserMsgRef.current) {
      setError(null);
      enviar(lastUserMsgRef.current);
    }
  }

  function manejar(parsed, nuevos) {
    const acc = parsed.siguiente_accion;
    const msg = parsed.mensaje || '';
    if (acc === 'meditacion' && msg.length > 200) {
      setMensajes([...nuevos, { rol: 'assistant', contenido: '', tipo: 'meditacion', texto: msg }]);
      setInteraccion({ tipo: 'esperando_input', placeholder: 'Cuéntame cómo te fue...' });
      return;
    }
    if (msg) setMensajes([...nuevos, { rol: 'assistant', contenido: msg }]);
    if (acc === 'pregunta_opciones' && parsed.preguntas?.length) setInteraccion({ tipo: 'opciones', preguntas: parsed.preguntas });
    else if (acc === 'analisis' && parsed.analisis) setInteraccion({ tipo: 'analisis', analisis: parsed.analisis });
    else if (acc === 'cierre') setInteraccion({ tipo: 'cierre' });
    else setInteraccion({ tipo: 'esperando_input', placeholder: 'Responde con tus propias palabras...' });
  }

  function nuevaSesion() {
    try { window.speechSynthesis.cancel(); } catch(e) {}
    sessionStorage.removeItem('lb_session_id');
    sessionIdRef.current = getSessionId();
    setMensajes([]); setInteraccion(null); setError(null);
    iniciar();
  }

  return (
    <div className="flex-1 flex flex-col max-w-3xl mx-auto w-full overflow-hidden">
      <div className="px-6 py-2 text-right">
        <button onClick={nuevaSesion} className="text-xs text-stone-500 hover:text-stone-700">Nueva sesión</button>
      </div>
      <div ref={chatRef} className="flex-1 overflow-y-auto scroll-fade px-6 py-2">
        {mensajes.map((m, i) => {
          if (m.tipo === 'meditacion') return <MeditacionCard key={i} texto={m.texto} />;
          if (!m.contenido) return null;
          return <Burbuja key={i} rol={m.rol} contenido={m.contenido} />;
        })}
        {interaccion?.tipo === 'opciones' && interaccion.preguntas.map((p, i) => (
          <PreguntaOpciones key={`p-${mensajes.length}-${i}`} pregunta={p} onResponder={enviar} />
        ))}
        {interaccion?.tipo === 'analisis' && <AnalisisCard analisis={interaccion.analisis} />}
        {pensando && (
          <div className="flex justify-start mb-4">
            <div className="bg-white border border-stone-200 rounded-2xl rounded-tl-sm px-4 py-3 flex items-center gap-2">
              <div className="w-2 h-2 rounded-full bg-[var(--color-accent)] breathing" />
              <span className="text-sm text-stone-500">Pensando...</span>
            </div>
          </div>
        )}
        {error && (
          <div className="bg-red-50 border border-red-200 rounded-lg p-3 mb-4 text-sm text-red-800">
            <strong>Error:</strong> {error}
            <div className="flex gap-3 mt-2 flex-wrap">
              {lastUserMsgRef.current && (
                <button onClick={reintentarUltimo} className="text-xs px-3 py-1 bg-[var(--color-base)] text-white rounded">Reintentar último mensaje</button>
              )}
              <button onClick={nuevaSesion} className="text-xs px-3 py-1 bg-stone-200 rounded">Empezar nueva sesión</button>
              <button onClick={() => setError(null)} className="text-xs underline">Cerrar</button>
            </div>
          </div>
        )}
        {interaccion?.tipo === 'cierre' && (
          <div className="bg-green-50 border border-green-200 rounded-lg p-4 mb-4 text-center">
            <p className="text-green-900 mb-3">Sesión cerrada.</p>
            <button onClick={nuevaSesion} className="px-5 py-2 bg-[var(--color-base)] text-white rounded-lg text-sm">Empezar nueva</button>
          </div>
        )}
      </div>
      {interaccion?.tipo === 'esperando_input' && (
        <InputLibre onEnviar={enviar} disabled={pensando} placeholder={interaccion.placeholder} />
      )}
    </div>
  );
}

// ─────────────────────────── BUSCAR (lectura del cofre) ───────────────────────────

function BuscarSection() {
  const [query, setQuery] = useState('');
  const [resultado, setResultado] = useState(null);
  const [buscando, setBuscando] = useState(false);
  const [error, setError] = useState(null);

  const buscar = async () => {
    if (!query.trim()) return;
    setBuscando(true); setError(null); setResultado(null);
    try {
      const res = await fetch(BUSCAR_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: query.trim(), enriquecer: true }),
      });
      if (!res.ok) throw new Error((await res.text()).substring(0, 200));
      setResultado(await res.json());
    } catch (e) { setError(e.message); }
    finally { setBuscando(false); }
  };

  return (
    <div className="flex-1 overflow-y-auto scroll-fade">
      <div className="max-w-3xl mx-auto p-6">
        <h2 className="text-2xl font-semibold text-[var(--color-base)] mb-2">Buscar lectura del cofre</h2>
        <p className="text-stone-600 mb-6 text-sm">Describe un síntoma. El sistema busca en los 671 achaques del curso de Pfister y te da una lectura biológica completa con órgano, capa embrionaria, fase, matiz emocional y sentido biológico.</p>
        <div className="bg-white rounded-2xl card-shadow p-5 mb-6">
          <textarea value={query} onChange={(e) => setQuery(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter' && e.ctrlKey) buscar(); }}
            placeholder="Ej: me duele el oído izquierdo desde hace una semana..."
            rows={3} className="w-full border border-stone-300 rounded-lg p-3 resize-none focus:outline-none focus:border-[var(--color-accent)] text-sm" />
          <div className="flex justify-between items-center mt-3">
            <p className="text-xs text-stone-400">Ctrl+Enter para buscar</p>
            <button onClick={buscar} disabled={buscando || query.trim().length < 3} className={`px-5 py-2 rounded-lg font-medium text-sm transition ${buscando || query.trim().length < 3 ? 'bg-stone-200 text-stone-400' : 'bg-[var(--color-base)] text-white hover:bg-[var(--color-soft)]'}`}>
              {buscando ? 'Buscando...' : 'Buscar'}
            </button>
          </div>
        </div>

        {error && (
          <div className="bg-red-50 border border-red-200 rounded-lg p-3 mb-4 text-sm text-red-800">
            <strong>Error:</strong> {error}
          </div>
        )}

        {resultado && (
          <div className="fade-in">
            {resultado.lectura ? (
              <div className="bg-white rounded-2xl card-shadow p-6 mb-6">
                <h3 className="font-semibold text-[var(--color-base)] mb-3">Lectura biológica</h3>
                <TextoFormateado texto={resultado.lectura} />
              </div>
            ) : null}

            <h3 className="font-semibold text-[var(--color-base)] mb-3">
              Síntomas más cercanos en el cofre {resultado.matches?.length ? `(${resultado.matches.length})` : ''}
            </h3>
            {!resultado.matches?.length && <p className="text-stone-500 text-sm">No se encontraron coincidencias. Intenta describir con otras palabras.</p>}
            <div className="space-y-2">
              {resultado.matches?.map((m, i) => {
                const lbl = COFRE_LABELS[m.cofre_slug] || { titulo: m.cofre_slug, color: '#666' };
                return (
                  <div key={i} className="bg-white border border-stone-200 rounded-lg p-4">
                    <div className="flex items-start justify-between gap-3 mb-2 flex-wrap">
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-medium text-stone-900">#{m.num} · {m.descripcion}</p>
                      </div>
                      <span className="text-xs px-2 py-1 rounded" style={{background: lbl.color + '22', color: lbl.color}}>
                        {lbl.titulo}
                      </span>
                    </div>
                    <div className="text-xs text-stone-500 flex gap-4 flex-wrap">
                      {m.organo && <span>🧬 {m.organo}</span>}
                      {m.capa && <span>🧪 {m.capa}</span>}
                      {m.fase && <span>⚡ {m.fase}</span>}
                      <span className="text-stone-400">match: {(m.score * 100).toFixed(0)}%</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────── COFRE (aprendizaje) ───────────────────────────

function CofreSection() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [cofreSel, setCofreSel] = useState(null);
  const [filtro, setFiltro] = useState('');

  useEffect(() => {
    fetch(COFRE_DATA_URL).then(r => r.json()).then(setData).catch(e => setError(e.message));
  }, []);

  if (error) return <div className="p-6 text-red-700">Error cargando cofre: {error}</div>;
  if (!data) return <div className="p-6 text-stone-500">Cargando datos del cofre...</div>;

  if (!cofreSel) {
    const cofres = Object.entries(data.cofres || {});
    return (
      <div className="flex-1 overflow-y-auto scroll-fade">
        <div className="max-w-4xl mx-auto p-6">
          <h2 className="text-2xl font-semibold text-[var(--color-base)] mb-2">El Cofre de los Achaques</h2>
          <p className="text-stone-600 mb-6 text-sm">
            Base de datos del curso de Mark Pfister con {data.total} síntomas catalogados según las Leyes Biológicas. Elige una hoja embrionaria para explorar.
          </p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {cofres.map(([slug, c]) => {
              const lbl = COFRE_LABELS[slug] || { titulo: slug, desc: '', color: '#666' };
              return (
                <button key={slug} onClick={() => setCofreSel(slug)}
                  className="bg-white rounded-2xl card-shadow p-5 text-left hover:scale-[1.02] transition">
                  <div className="flex items-center justify-between mb-2">
                    <h3 className="font-semibold text-lg" style={{color: lbl.color}}>{lbl.titulo}</h3>
                    <span className="text-xs px-2 py-1 rounded-full bg-stone-100 text-stone-600">{c.total_sintomas} achaques</span>
                  </div>
                  <p className="text-sm text-stone-500">{lbl.desc}</p>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  const c = data.cofres[cofreSel];
  const lbl = COFRE_LABELS[cofreSel] || { titulo: cofreSel, color: '#666' };
  const sintomasFiltrados = c.sintomas.filter(s => {
    if (!filtro) return true;
    const f = filtro.toLowerCase();
    return (s.descripcion || '').toLowerCase().includes(f) || (s.organo || '').toLowerCase().includes(f);
  });

  return (
    <div className="flex-1 overflow-y-auto scroll-fade">
      <div className="max-w-4xl mx-auto p-6">
        <button onClick={() => { setCofreSel(null); setFiltro(''); }} className="text-sm text-stone-500 hover:text-stone-700 mb-3">← volver a todos los cofres</button>
        <div className="flex items-baseline justify-between mb-4 flex-wrap gap-2">
          <h2 className="text-2xl font-semibold" style={{color: lbl.color}}>{lbl.titulo}</h2>
          <span className="text-sm text-stone-500">{sintomasFiltrados.length} de {c.total_sintomas}</span>
        </div>
        <p className="text-stone-600 mb-4 text-sm">{lbl.desc}</p>
        <input type="text" value={filtro} onChange={(e) => setFiltro(e.target.value)}
          placeholder="Filtrar por texto u órgano..."
          className="w-full border border-stone-300 rounded-lg p-2.5 mb-4 focus:outline-none focus:border-[var(--color-accent)] text-sm" />
        <div className="space-y-2">
          {sintomasFiltrados.map((s, i) => (
            <div key={i} className="bg-white border border-stone-200 rounded-lg p-3">
              <div className="flex items-start gap-3">
                <span className="text-xs font-mono bg-stone-100 px-2 py-1 rounded text-stone-600 flex-shrink-0">#{s.num}</span>
                <div className="flex-1 min-w-0">
                  <p className="text-sm text-stone-900 mb-2">{s.descripcion}</p>
                  <div className="text-xs text-stone-500 flex gap-3 flex-wrap">
                    {s.organo && <span>🧬 {s.organo}</span>}
                    {s.capa && <span>🧪 {s.capa}</span>}
                    {s.fase && <span>⚡ {s.fase}</span>}
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────── APP ───────────────────────────

function App() {
  const [aceptado, setAceptado] = useState(() => localStorage.getItem('lb_disclaimer') === 'yes');
  const [tab, setTab] = useState(() => localStorage.getItem('lb_tab') || 'coach');

  useEffect(() => { localStorage.setItem('lb_tab', tab); }, [tab]);

  if (!aceptado) return <DisclaimerScreen onAccept={() => { localStorage.setItem('lb_disclaimer', 'yes'); setAceptado(true); }} />;

  return (
    <div className="min-h-screen gradient-bg flex flex-col">
      <div className="border-b border-stone-200 bg-white/80 backdrop-blur sticky top-0 z-10">
        <div className="max-w-4xl mx-auto px-6 py-3 flex items-center justify-between">
          <Logo onClick={() => setTab('coach')} />
        </div>
      </div>
      <Tabs tab={tab} onChange={setTab} />
      {tab === 'coach' && <CoachSection />}
      {tab === 'buscar' && <BuscarSection />}
      {tab === 'cofre' && <CofreSection />}
      <div className="text-center py-3 text-xs text-stone-400">No es diagnóstico médico</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
