<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leyes Biológicas — Coach autónomo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --color-base: #1a3a52;
    --color-soft: #5c7c8c;
    --color-bg: #faf7f2;
    --color-accent: #c47b5a;
  }
  html, body { background: var(--color-bg); font-family: 'Inter', system-ui, sans-serif; }
  .gradient-bg { background: linear-gradient(135deg, #faf7f2 0%, #f0ebe1 100%); }
  .card-shadow { box-shadow: 0 10px 40px -10px rgba(26, 58, 82, 0.15); }
  .breathing { animation: breathe 3s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } }
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .scroll-fade::-webkit-scrollbar { width: 6px; }
  .scroll-fade::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Endpoint del backend. Si el HTML se sirve desde el mismo backend, usa rutas relativas.
const API_BASE = window.location.origin;
const CHAT_ENDPOINT = `${API_BASE}/api/chat`;

// ============================================================
// Llamada al backend con streaming SSE
// ============================================================

async function llamarBackend({ mensajes, onChunk, onError }) {
  try {
    const res = await fetch(CHAT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: mensajes }),
    });

    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`Servidor ${res.status}: ${txt}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let textoCompleto = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') continue;
        try {
          const ev = JSON.parse(data);
          if (ev.chunk) {
            textoCompleto += ev.chunk;
            if (onChunk) onChunk(textoCompleto);
          } else if (ev.error) {
            throw new Error(ev.error);
          }
        } catch (e) {
          if (e.message?.startsWith('Servidor')) throw e;
        }
      }
    }
    return textoCompleto;
  } catch (e) {
    if (onError) onError(e);
    throw e;
  }
}

function parsearRespuesta(texto) {
  let inicio = texto.indexOf('{');
  let fin = texto.lastIndexOf('}');
  if (inicio === -1 || fin === -1) return null;
  const jsonStr = texto.slice(inicio, fin + 1);
  try { return JSON.parse(jsonStr); }
  catch (e) {
    try { return JSON.parse(jsonStr.replace(/,(\s*[}\]])/g, '$1')); }
    catch (e2) { return null; }
  }
}

// ============================================================
// Componentes UI (idénticos al v2)
// ============================================================

function Logo() {
  return (
    <div className="flex items-center gap-2">
      <div className="w-8 h-8 rounded-full bg-[var(--color-base)] flex items-center justify-center">
        <div className="w-3 h-3 rounded-full bg-[var(--color-accent)] breathing" />
      </div>
      <span className="text-lg font-medium text-[var(--color-base)]">Leyes Biológicas</span>
    </div>
  );
}

function DisclaimerScreen({ onAccept }) {
  const [checked, setChecked] = useState(false);
  return (
    <div className="min-h-screen gradient-bg flex items-center justify-center p-6">
      <div className="bg-white rounded-2xl card-shadow max-w-2xl p-10 fade-in">
        <Logo />
        <h1 className="text-3xl font-semibold text-[var(--color-base)] mt-8 mb-4">
          Antes de comenzar
        </h1>
        <p className="text-stone-700 leading-relaxed mb-4">
          Esta es una herramienta de autoconocimiento basada en las Leyes Biológicas de Hamer (marco de Mark Pfister). Te acompaña a explorar el sentido emocional y biológico de un síntoma físico.
        </p>
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6">
          <p className="text-amber-900 text-sm leading-relaxed">
            <strong>No es diagnóstico médico.</strong> No sustituye atención profesional. Si tienes síntomas graves, condiciones serias en curso, o estás en una emergencia, consulta a un médico antes de usar esta herramienta.
          </p>
        </div>
        <label className="flex items-start gap-3 mb-6 cursor-pointer">
          <input
            type="checkbox"
            checked={checked}
            onChange={(e) => setChecked(e.target.checked)}
            className="mt-1 w-5 h-5 accent-[var(--color-accent)]"
          />
          <span className="text-stone-700 text-sm">
            Entiendo que esto es una herramienta de exploración personal y no reemplaza atención médica.
          </span>
        </label>
        <button
          onClick={onAccept}
          disabled={!checked}
          className={`w-full py-3 rounded-lg font-medium transition ${
            checked ? 'bg-[var(--color-base)] text-white hover:bg-[var(--color-soft)]' : 'bg-stone-200 text-stone-400 cursor-not-allowed'
          }`}
        >
          Empezar
        </button>
      </div>
    </div>
  );
}

function MensajeBurbuja({ rol, contenido }) {
  if (rol === 'user') {
    return (
      <div className="flex justify-end mb-4 fade-in">
        <div className="bg-[var(--color-base)] text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[80%]">
          <p className="whitespace-pre-wrap">{contenido}</p>
        </div>
      </div>
    );
  }
  return (
    <div className="flex justify-start mb-4 fade-in">
      <div className="bg-white border border-stone-200 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%] card-shadow">
        <p className="whitespace-pre-wrap text-stone-800">{contenido}</p>
      </div>
    </div>
  );
}

function PreguntaOpciones({ pregunta, onResponder }) {
  const [seleccion, setSeleccion] = useState(pregunta.multi_select ? [] : null);
  const multi = pregunta.multi_select;

  const toggle = (label) => {
    if (multi) {
      setSeleccion(seleccion.includes(label) ? seleccion.filter(x => x !== label) : [...seleccion, label]);
    } else {
      setSeleccion(label);
    }
  };

  const valido = multi ? seleccion.length > 0 : seleccion !== null;
  const enviar = () => {
    const respuesta = multi ? seleccion.join(', ') : seleccion;
    onResponder(`${pregunta.pregunta}\n→ ${respuesta}`);
  };

  return (
    <div className="bg-white border border-stone-200 rounded-2xl p-5 mb-4 card-shadow fade-in">
      <p className="font-medium text-[var(--color-base)] mb-3">{pregunta.pregunta}</p>
      <div className="space-y-2 mb-4">
        {pregunta.opciones?.map((op, i) => {
          const activo = multi ? seleccion.includes(op.label) : seleccion === op.label;
          return (
            <button
              key={i}
              onClick={() => toggle(op.label)}
              className={`w-full text-left p-3 rounded-lg border-2 transition text-sm ${
                activo ? 'border-[var(--color-accent)] bg-orange-50' : 'border-stone-200 hover:border-stone-300'
              }`}
            >
              <div className="font-medium text-stone-900">{op.label}</div>
              {op.desc && <div className="text-xs text-stone-600 mt-1">{op.desc}</div>}
            </button>
          );
        })}
      </div>
      <button
        onClick={enviar}
        disabled={!valido}
        className={`w-full py-2.5 rounded-lg font-medium text-sm transition ${
          valido ? 'bg-[var(--color-base)] text-white hover:bg-[var(--color-soft)]' : 'bg-stone-200 text-stone-400'
        }`}
      >
        Responder
      </button>
    </div>
  );
}

function AnalisisCard({ analisis }) {
  return (
    <div className="bg-white border border-stone-200 rounded-2xl p-5 mb-4 card-shadow fade-in">
      <h3 className="font-semibold text-[var(--color-base)] mb-3">Análisis</h3>
      <div className="space-y-3 mb-4">
        {analisis.tejidos?.map((t, i) => (
          <div key={i} className="border-l-4 border-[var(--color-accent)] pl-4 py-1">
            <div className="flex items-baseline gap-2 mb-1">
              <span className="font-semibold text-[var(--color-base)]">{t.nombre}</span>
              <span className="text-xs text-stone-500 bg-stone-100 px-2 py-0.5 rounded">{t.hoja_embrionaria}</span>
            </div>
            <div className="text-xs text-stone-500 mb-1">Síntoma: {t.sintoma} · Fase: {t.fase}</div>
            <p className="text-sm text-stone-700 italic">"{t.matiz_emocional}"</p>
          </div>
        ))}
      </div>
      {analisis.lectura_integrada && (
        <div className="bg-stone-50 rounded-lg p-3 text-sm text-stone-700 whitespace-pre-wrap">
          {analisis.lectura_integrada}
        </div>
      )}
    </div>
  );
}

function InputLibre({ onEnviar, disabled, placeholder }) {
  const [texto, setTexto] = useState('');
  const ref = useRef();

  useEffect(() => {
    if (!disabled && ref.current) ref.current.focus();
  }, [disabled]);

  const enviar = () => {
    if (texto.trim() && !disabled) {
      onEnviar(texto.trim());
      setTexto('');
    }
  };

  return (
    <div className="border-t border-stone-200 bg-white p-4 rounded-b-2xl">
      <div className="flex gap-2">
        <textarea
          ref={ref}
          value={texto}
          onChange={(e) => setTexto(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              enviar();
            }
          }}
          placeholder={placeholder || "Escribe tu respuesta..."}
          rows={2}
          disabled={disabled}
          className="flex-1 border border-stone-300 rounded-lg p-2.5 resize-none focus:outline-none focus:border-[var(--color-accent)] text-sm disabled:bg-stone-50"
        />
        <button
          onClick={enviar}
          disabled={!texto.trim() || disabled}
          className={`px-5 rounded-lg font-medium transition ${
            texto.trim() && !disabled ? 'bg-[var(--color-base)] text-white hover:bg-[var(--color-soft)]' : 'bg-stone-200 text-stone-400'
          }`}
        >
          Enviar
        </button>
      </div>
      <p className="text-xs text-stone-400 mt-2">Enter para enviar · Shift+Enter para nueva línea</p>
    </div>
  );
}

function PensandoIndicador() {
  return (
    <div className="flex justify-start mb-4 fade-in">
      <div className="bg-white border border-stone-200 rounded-2xl rounded-tl-sm px-4 py-3 flex items-center gap-2">
        <div className="w-2 h-2 rounded-full bg-[var(--color-accent)] breathing" />
        <span className="text-sm text-stone-500">Pensando...</span>
      </div>
    </div>
  );
}

// ============================================================
// App principal
// ============================================================

function App() {
  const [aceptado, setAceptado] = useState(() => localStorage.getItem('lb_disclaimer') === 'yes');
  const [mensajes, setMensajes] = useState([]);
  const [interaccion, setInteraccion] = useState(null);
  const [pensando, setPensando] = useState(false);
  const [error, setError] = useState(null);
  const chatRef = useRef();

  useEffect(() => {
    if (chatRef.current) {
      chatRef.current.scrollTop = chatRef.current.scrollHeight;
    }
  }, [mensajes, interaccion, pensando]);

  useEffect(() => {
    if (aceptado && mensajes.length === 0) {
      iniciarConversacion();
    }
  }, [aceptado]);

  function iniciarConversacion() {
    const msgInicial = {
      rol: 'assistant',
      contenido: "Hola. Cuéntame qué síntoma físico te está pasando. Descríbelo con tus propias palabras, no necesitas usar términos médicos. Cuando quieras estoy listo para empezar."
    };
    setMensajes([msgInicial]);
    setInteraccion({ tipo: 'esperando_input', placeholder: 'Describe tu síntoma con tus propias palabras...' });
  }

  async function enviarMensaje(texto) {
    setError(null);
    const nuevosMsgs = [...mensajes, { rol: 'user', contenido: texto }];
    setMensajes(nuevosMsgs);
    setInteraccion(null);
    setPensando(true);

    const apiMessages = nuevosMsgs
      .filter(m => m.rol === 'user' || m.rol === 'assistant')
      .map(m => ({ role: m.rol === 'user' ? 'user' : 'assistant', content: m.contenido }));

    try {
      let respuestaCruda = '';
      await llamarBackend({
        mensajes: apiMessages,
        onChunk: (txt) => { respuestaCruda = txt; },
      });

      const parsed = parsearRespuesta(respuestaCruda);
      if (!parsed) {
        setMensajes([...nuevosMsgs, { rol: 'assistant', contenido: respuestaCruda }]);
        setInteraccion({ tipo: 'esperando_input', placeholder: 'Continúa...' });
      } else {
        const msgAsistente = { rol: 'assistant', contenido: parsed.mensaje || '' };
        setMensajes([...nuevosMsgs, msgAsistente]);
        manejarAccion(parsed);
      }
    } catch (e) {
      console.error(e);
      setError(e.message);
    } finally {
      setPensando(false);
    }
  }

  function manejarAccion(parsed) {
    const accion = parsed.siguiente_accion;
    if (accion === 'pregunta_opciones' && parsed.preguntas?.length) {
      setInteraccion({ tipo: 'opciones', preguntas: parsed.preguntas });
    } else if (accion === 'analisis' && parsed.analisis) {
      setInteraccion({ tipo: 'analisis', analisis: parsed.analisis });
    } else if (accion === 'pregunta_abierta') {
      setInteraccion({ tipo: 'esperando_input', placeholder: 'Responde con tus propias palabras...' });
    } else if (accion === 'ofrecer_meditacion' || accion === 'meditacion') {
      setInteraccion({ tipo: 'esperando_input', placeholder: 'Tu respuesta...' });
    } else if (accion === 'cierre') {
      setInteraccion({ tipo: 'cierre' });
    } else {
      setInteraccion({ tipo: 'esperando_input', placeholder: 'Continúa...' });
    }
  }

  function reiniciar() {
    setMensajes([]);
    setInteraccion(null);
    setError(null);
    iniciarConversacion();
  }

  if (!aceptado) {
    return <DisclaimerScreen onAccept={() => { localStorage.setItem('lb_disclaimer', 'yes'); setAceptado(true); }} />;
  }

  return (
    <div className="min-h-screen gradient-bg flex flex-col">
      <div className="border-b border-stone-200 bg-white/80 backdrop-blur sticky top-0 z-10">
        <div className="max-w-3xl mx-auto px-6 py-3 flex items-center justify-between">
          <Logo />
          <button
            onClick={reiniciar}
            className="text-xs text-stone-500 hover:text-stone-700"
          >
            Nueva sesión
          </button>
        </div>
      </div>

      <div className="flex-1 overflow-hidden flex flex-col max-w-3xl mx-auto w-full">
        <div ref={chatRef} className="flex-1 overflow-y-auto scroll-fade px-6 py-6">
          {mensajes.map((m, i) => (
            <MensajeBurbuja key={i} rol={m.rol} contenido={m.contenido} />
          ))}

          {interaccion?.tipo === 'opciones' && interaccion.preguntas.map((p, i) => (
            <PreguntaOpciones
              key={`pregunta-${mensajes.length}-${i}`}
              pregunta={p}
              onResponder={enviarMensaje}
            />
          ))}

          {interaccion?.tipo === 'analisis' && (
            <AnalisisCard analisis={interaccion.analisis} />
          )}

          {pensando && <PensandoIndicador />}

          {error && (
            <div className="bg-red-50 border border-red-200 rounded-lg p-3 mb-4 text-sm text-red-800">
              <strong>Error:</strong> {error}
              <button onClick={() => setError(null)} className="block text-xs mt-1 underline">Cerrar</button>
            </div>
          )}

          {interaccion?.tipo === 'cierre' && (
            <div className="bg-green-50 border border-green-200 rounded-lg p-4 mb-4 text-center">
              <p className="text-green-900 mb-3">Sesión cerrada.</p>
              <button
                onClick={reiniciar}
                className="px-5 py-2 bg-[var(--color-base)] text-white rounded-lg text-sm hover:bg-[var(--color-soft)]"
              >
                Empezar nueva sesión
              </button>
            </div>
          )}
        </div>

        {interaccion?.tipo === 'esperando_input' && (
          <InputLibre
            onEnviar={enviarMensaje}
            disabled={pensando}
            placeholder={interaccion.placeholder}
          />
        )}
      </div>

      <div className="text-center py-3 text-xs text-stone-400">
        No es diagnóstico médico
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
